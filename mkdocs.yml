site_name: My Blog
site_url: https://woodson-04.github.io/dlf.github.io/

theme:
  name: material
  features:
    - navigation.tabs  # 顶部标签式导航栏
    - navigation.path    # 启用面包屑导航
    - navigation.instant   # 优化交互流畅度（可选）
    - content.code.annotate  # 添加这个特性以支持数学公式
    - navigation.indexes
  palette:
  logo: img/logo.svg       # 导航栏logo路径
  favicon: img/favicon.svg # favicon路径
  
plugins:
  - search  # 默认搜索插件
  #- blog:   # 博客插件配置
      #post_dir: posts

nav: 
# 注意贡献时 - 不可少，且前面空格必须手打，不能tab
  - 主页: index.md
  - 农学:
    - posts/农学/index.md
    - 自己阅读书籍笔记:
      - posts/农学/book_notes/index.md
      - 植物系统学(PLANT SYSTEMATICS): posts/农学/book_notes/plant_systematics.md
      - 生物化学(BIOCHEMISTRY): posts/农学/book_notes/biochemistry.md
      - 生物物理学(BIOPHYSICS): posts/农学/book_notes/biophysics.md
    - 课程复习资料分享: posts/农学/course_review_materials/index.md
    - 课程笔记(不建议观看): 
      - posts/农学/lecture_notes/index.md
      - 农业昆虫学(AGRICULTURAL ENTOMOLOGY): posts/农学/lecture_notes/agricultural_entomology.md
      - 农业生态学(AGROECOLOGY): posts/农学/lecture_notes/agroecology.md
      - 作物育种学(CROP BREEDING): posts/农学/lecture_notes/crop_breeding.md
      - 作物栽培学(CROP CULTIVATION SCIENCE): posts/农学/lecture_notes/crop_cultivation_science.md
      - 遗传学(GENETICS): posts/农学/lecture_notes/genetics.md
      - 植物学及实验(甲)(PLANT): posts/农学/lecture_notes/plant.md
      - 种子病理学(SEED PATHOLOGY): posts/农学/lecture_notes/seed_pathology.md
      - 种子生产学(SEED PRODUCT SCIENCE): posts/农学/lecture_notes/seed_product_science.md
      - 种子贮藏加工学(SEED STORAGE AND PROCESSING SCIENCE): posts/农学/lecture_notes/seed_storage_and_processing_science.md
  #- 公务员: posts/公务员/index.md
  - 模板: 
    - posts/模板/index.md
    - PPT: posts/模板/PPT.md
  - 思想感悟: 
    - posts/思想感悟/index.md
    #- 人际交往: posts/思想感悟/人际交往.md
  - 天文: 
    - posts/天文/index.md
    - 《天文学教程》: posts/天文/astronomy_tutorial.md
    - 图片: posts/天文/photos.md
  - 绿色植物百科:
    - posts/绿色植物百科/index.md
    - 藻类: posts/绿色植物百科/藻类.md
    - 苔藓类: posts/绿色植物百科/苔藓类.md
    - 石松类和蕨类: posts/绿色植物百科/石松类和蕨类.md
    - 裸子植物: posts/绿色植物百科/裸子植物.md
    - 被子植物: posts/绿色植物百科/被子植物.md

markdown_extensions:
  - attr_list  # 允许 Markdown 中添加 HTML 属性（如图片样式）
  - pymdownx.arithmatex:  # 添加数学公式支持
      generic: true       # 使用通用模式（KaTeX）
  - pymdownx.superfences
  - pymdownx.highlight

copyright: Copyright © 2023-2026 Woodson

extra_javascript:
  # 用mathjax显示数学公式
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  # 现有样式
  - stylesheets/custom.css
use_directory_urls: false  # 禁用目录式URL，确保图片路径正确